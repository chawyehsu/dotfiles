# base16-selenized-black theme for vivid
colors:
  black:  "181818"
  red:    "ed4a46"
  green:  "70b433"
  yellow: "dbb32d"
  blue:   "368aeb"
  purple: "a580e2"
  cyan:   "3fc5b7"
  orange: "dedede"
  white:  "b9b9b9"
  base01: "777777"

core:
  normal_text:
    foreground: white

  regular_file:
    foreground: white

  reset_to_normal:
    foreground: orange

  directory:
    foreground: purple

  symlink:
    foreground: cyan

  multi_hard_link: {}

  fifo:
    foreground: yellow
    background: black

  socket:
    foreground: blue
    background: black
    font-style: bold

  door:
    foreground: blue
    background: black
    font-style: bold

  block_device:
    foreground: yellow
    background: black
    font-style: bold

  character_device:
    foreground: yellow
    background: black
    font-style: bold

  broken_symlink:
    foreground: red
    background: black
    font-style: bold

  missing_symlink_target:
    foreground: red
    background: black

  setuid:
    foreground: white
    background: red

  setgid:
    foreground: black
    background: yellow

  file_with_capability: {}

  sticky_other_writable:
    foreground: black
    background: green

  other_writable:
    foreground: purple
    background: green

  sticky:
    foreground: white
    background: purple

  executable_file:
