# yaml-language-server: $schema=https://raw.githubusercontent.com/sharkdp/vivid/refs/heads/master/schemas/theme.json
# base16-selenized-black theme for vivid
colors:
  black:   "181818"
  white:   "b9b9b9"
  red:     "ed4a46"
  yellow:  "dbb32d"
  green:   "70b433"
  cyan:    "3fc5b7"
  blue:    "368aeb"
  magenta: "a580e2"
  base03:  "777777"

core:
  normal_text: {}
  regular_file: {}
  reset_to_normal: {}

  directory:
    foreground: blue

  symlink:
    foreground: magenta

  multi_hard_link: {}

  fifo:
    foreground: black
    background: blue

  socket:
    foreground: black
    background: magenta

  door:
    foreground: black
    background: magenta

  block_device:
    foreground: cyan
    background: black

  character_device:
    foreground: magenta
    background: black

  broken_symlink:
    foreground: black
    background: red

  missing_symlink_target:
    foreground: black
    background: red

  setuid: {}

  setgid: {}

  file_with_capability: {}

  sticky_other_writable: {}

  other_writable: {}

  sticky: {}

  executable_file:
    foreground: red
    font-style: bold

text:
  special:
    foreground: black
    background: yellow

  todo:
    font-style: bold

  licenses:
    foreground: base03

  configuration:
    foreground: yellow

  other:
    foreground: yellow

markup:
  foreground: yellow

programming:
  source:
    foreground: green

  tooling:
    foreground: green

    continuous-integration:
      foreground: green

media:
  foreground: magenta

office:
  foreground: red

archives:
  foreground: cyan
  font-style: underline

executable:
  foreground: red
  font-style: bold

unimportant:
  foreground: base03
