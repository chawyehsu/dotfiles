#:schema https://docs.jj-vcs.dev/latest/config-schema.json
# doc: https://docs.jj-vcs.dev/latest/config/
[user]
name = "Chawye Hsu"
email = "su+git@chawyehsu.com"
key = "0F08DA819FFD7B2D519673B65AE5178B3E1624DA"

[signing]
behavior = "own"
backend = "gpg"

[aliases]
ab = ["absorb"]
## bookmark
# Bookmark advance was introduced in jj 0.39.0, it's inspired by `tug`
# ref: https://github.com/jj-vcs/jj/pull/8830
ba = ["bookmark", "advance"]
bc = ["bookmark", "create"]
bf = ["bookmark", "forget"]
bl = ["bookmark", "list", "--all-remotes"]
bm = ["bookmark", "move"]
bmt = ["bookmark", "move", "--to"]
bt = ["bookmark", "track"]
btm = ["bookmark", "track", "main", "--remote", "origin"]
d = ["describe"]
dm = ["describe", "-m"]
df = ["diff"]
dfr = ["diff", "-r"]
dup = ["duplicate"]
drop = ["abandon"]
e = ["edit"]
# show full description
# ref: https://github.com/jj-vcs/jj/discussions/2225#discussioncomment-15910434
fd = ["show", "--no-patch", "-T", "description"]
l = ["log"]
lr = ["log", "-r"]
lg = ["log", "-r", "all()"]
## sync by merging instead of rebasing
# merge from Y
mf = ["new", "nearest_non_trunk_bookmark", "-r"]
# merge trunk
mt = ["mf", "trunk()"]
n = ["new"]
ol = ["op", "log"]
# rebase
rb = ["rebase", "--skip-emptied"]
rbo = ["rebase", "--skip-emptied", "-o"]
rbt = ["rebase", "--skip-emptied", "-o", "trunk()"]
re = ["restore", "-i"]
rea = ["restore"]
s = ["status"]
sp = ["split"]
sq = ["squash", "-i"]
sqa = ["squash"]
# tug is deprecated, use `bookmark advance` instead
# ref:
# - https://shaddy.dev/notes/jj-tug/
# - https://github.com/jj-vcs/jj/discussions/2425#discussioncomment-13347028
tug = ["bookmark", "move", "--from", "nearest_bookmark(@-)", "--to", "nearest_nonempty(@-)"]
# git
g = ["git"]
gc = ["git", "clone"]
gf = ["git", "fetch"]
gfu = ["git", "fetch", "--remote", "upstream"]
gi = ["git", "init"]
gp = ["git", "push"]
gpb = ["git", "push", "-b"]
gpc = ["git", "push", "-c"]
gpm = ["git", "push", "-b", "main"]
gr = ["git", "remote"]
gra = ["git", "remote", "add"]
grl = ["git", "remote", "list"]
# tag
tl = ["tag", "list"]
ts = ["tag", "set"]
# workspace
w = ["workspace"]
wl = ["workspace", "list"]
wr = ["workspace", "root", "--name"]
wn = ["workspace", "rename"]
wu = ["workspace", "update-stale"]

[ui]
default-command = "status"
diff-editor = ":builtin"
editor = "nano"

[git]
# (batch) sign commits only upon push
sign-on-push = true
# write an extra commit-header named `change-id`
write-change-id-header = true

[working-copy]
# similar to git's core.autocrlf = input
eol-conversion = "input"

[revsets]
bookmark-advance-to = 'closest_pushable(@)'

[revset-aliases]
# https://github.com/jj-vcs/jj/discussions/6890
_ = "@"
# handy revsets from https://github.com/jj-vcs/jj/discussions/2425#discussioncomment-13347028
'nearest_bookmark(to)' = 'heads(::to & bookmarks())'
'nearest_nonempty(to)' = 'heads(::to ~ empty())'
'nearest_non_trunk_bookmark' = 'heads(nearest_bookmark(@) & ~trunk())'
# Closest revision that is described and either non-empty or a merge
# I removed the `mutable()` filter because it was too restrictive for me,
# immutable revisions can be pushed too, right?
# ref: https://github.com/jj-vcs/jj/pull/9035/changes
# future improvement: https://github.com/jj-vcs/jj/issues/9055
'closest_pushable(to)' = 'heads(::to & ~description(exact:"") & (~empty() | merges()))'

[templates]
commit_trailers = '''
format_signed_off_by_trailer(self)'''
