--when.platforms = ["windows"]

[aliases]
wa = ["util", "exec", "--", "powershell", "-nop", "-command", '&{$repo=$(Resolve-Path "$(jj git root)\..\"); $wsroot="$repo\.jjws"; if(!(Test-Path $wsroot)){New-Item -ItemType Directory -Path $wsroot | Out-Null}; jj workspace add --name $args "$wsroot\$args"}']
